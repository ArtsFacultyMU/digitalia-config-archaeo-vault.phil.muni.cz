name: 

env:
  TAG: "${{ github.ref_name }}-dev"

on:
  push:
    branches: [ "agent_nfield", "0.1.5" ]
  #pull_request:
  #  branches: [ "main" ]

  workflow_dispatch:

jobs:
  # This workflow contains a single job called "build"
  trigger-build:
    # The type of runner that the job will run on
    runs-on: ubuntu-slim

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: trigger build
        run: |
          curl -L -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.TEST_TRIGGER_BUILD }}" \
          -H "X-GitHub-Api-Version: 2026-03-10" \
          "https://api.github.com/repos/ArtsFacultyMU/digitalia-image-archaeo-vault.phil.muni.cz/actions/workflows/docker-image-auto.yml/dispatches" \
          -d '{"ref": "prod-current", "inputs": {"tags": "cerit.io/xadler/archaeo-vault-drupal:$TAG"}}'

