name: 

env:
  # if no tag exists, use "dev" as suffix
  #TAG: github.ref_type == "branch" && "${{ github.ref_name }}-dev" || github.ref_name
  TAG: ${{ github.ref_name }}${{ case(github.ref_type == 'branch', '-dev', '') }}

on:
  push:
    branches: [ "main", "0.1.3", "0.1.4", "0.1.5" ]
  #pull_request:
  #  branches: [ "main" ]

  workflow_dispatch:


jobs:
  # This workflow contains a single job called "build"
  trigger-build:
    # The type of runner that the job will run on
    runs-on: ubuntu-slim

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: trigger build
        run: |
          jq -n --arg tag "${{ env.TAG }}" --arg branch_conf "${{ github.ref_name }}" '{ref: "prod-current", inputs:{tag: $tag, branch_conf: $branch_conf}}' |
          curl -L -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.TEST_TRIGGER_BUILD }}" \
          -H "X-GitHub-Api-Version: 2026-03-10" \
          "https://api.github.com/repos/ArtsFacultyMU/digitalia-image-archaeo-vault.phil.muni.cz/actions/workflows/docker-image-auto.yml/dispatches" \
          -d @-

