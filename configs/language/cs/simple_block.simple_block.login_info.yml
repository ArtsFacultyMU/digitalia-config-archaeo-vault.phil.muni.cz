content:
  value: '<p>Pro přihlášení vyberte svoji instituci a přihlaste se pomocí svých institucionálních přihlašovacích údajů. Pokud vaše instituce není přes e-INFRA přihlášení dostupná, můžete použít přihlášení přes ORCID nebo Google. Pokud se přihlašujete prvně, bude vaše registrace čekat na schválení. V případě potřeby <a href="https://artsfacultymu.github.io/digitalia-documentation/000_General/N%C3%A1vod-pro-p%C5%99ihl%C3%A1%C5%A1en%C3%AD">je k dispozici tutoriál</a>.</p>'
  format: basic_html
